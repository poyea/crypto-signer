name: Publish

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write  # needed to push CHANGELOG.md and create GitHub Release

jobs:
  build-libs:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: false
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            use_cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            use_cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            use_cross: false
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build static library
        run: ${{ matrix.use_cross && 'cross' || 'cargo' }} rustc --release --all-features --target ${{ matrix.target }} -- --crate-type staticlib
        shell: bash

      - name: Package artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          STEM="libcrypto_signer-${{ github.ref_name }}-${{ matrix.target }}"
          cp target/${{ matrix.target }}/release/libcrypto_signer.a "${STEM}.a"
          tar czf "${STEM}.tar.gz" "${STEM}.a"
        shell: bash

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        run: |
          $stem = "libcrypto_signer-${{ github.ref_name }}-${{ matrix.target }}"
          Copy-Item "target\${{ matrix.target }}\release\crypto_signer.lib" "$stem.lib"
          Compress-Archive -Path "$stem.lib" -DestinationPath "$stem.zip"
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lib-${{ matrix.target }}
          path: |
            libcrypto_signer-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
            libcrypto_signer-${{ github.ref_name }}-${{ matrix.target }}.zip
          if-no-files-found: ignore

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-libs
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Update CHANGELOG.md
        run: git cliff --output CHANGELOG.md

      - name: Commit updated CHANGELOG.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "chore: update CHANGELOG.md for ${{ github.ref_name }}"
          git push origin HEAD:main

      - name: Generate release notes for this tag
        run: git cliff --current --strip header > RELEASE_NOTES.md

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate SHA-256 checksums
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Append checksums to release notes
        run: |
          echo "" >> RELEASE_NOTES.md
          echo "## SHA-256 Checksums" >> RELEASE_NOTES.md
          echo '```' >> RELEASE_NOTES.md
          cat artifacts/SHA256SUMS.txt >> RELEASE_NOTES.md
          echo '```' >> RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          tag_name: ${{ github.ref_name }}
          files: |
            artifacts/**
            artifacts/SHA256SUMS.txt

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Verify version matches tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*= *"\(.*\)"/\1/')
          if [ "$TAG" != "$CARGO_VERSION" ]; then
            echo "Tag $TAG does not match Cargo.toml version $CARGO_VERSION"
            exit 1
          fi

      - name: Publish to crates.io
        run: cargo publish --all-features
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
